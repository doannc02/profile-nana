<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLV Nguyễn Ngọc Anh</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% -10%, #ff2d95 0%, transparent 50%),
    linear-gradient(180deg, #d81b60 0%, #6a0f3a 40%, #0d0d0d 80%, #000 100%);
  display: flex;
  justify-content: center;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 600px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 14px;
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  color: #000;
  font-weight: 600;
  font-size: 14px;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* ── CONTAINER ── */
.container {
  width: 100%;
  max-width: 600px;
  padding: 100px 20px 64px;
  text-align: center;
}

/* ── AVATAR ── */
.avatar {
  position: relative;
  width: 100px;
  height: 100px;
  margin: 0 auto;
  cursor: pointer;
}

.avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 3px solid white;
  object-fit: cover;
  object-position: center 20%;
  transform: scale(1.3);
  transition: transform 0.3s ease;
  display: block;
}

.avatar:hover img { transform: scale(1.43); }

.avatar::before {
  content: "";
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: linear-gradient(45deg, #ff2d95, #ff7ad9, #ff2d95);
  filter: blur(12px);
  z-index: -1;
  animation: glow 3s ease infinite;
}

@keyframes glow {
  0%, 100% { opacity: 0.7; filter: blur(10px); }
  50%       { opacity: 1;   filter: blur(20px); }
}

.badge {
  position: absolute;
  bottom: 2px;
  right: 2px;
  background: #1da1f2;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  border: 2px solid white;
}

/* ── PROFILE TEXT ── */
.name { font-size: 22px; font-weight: 700; margin-top: 22px; letter-spacing: -0.3px; }
.bio  { font-size: 14px; opacity: 0.8; margin-top: 8px; line-height: 1.5; }

/* ── SOCIAL ── */
.social {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 24px 0 28px;
}

.icon {
  width: 28px;
  height: 28px;
  cursor: pointer;
  transition: transform 0.22s ease;
  display: block;
  flex-shrink: 0;
}

.icon:hover { transform: scale(1.22) rotate(-6deg); }

/* ── CARDS ── */
.cards { display: flex; flex-direction: column; gap: 12px; }

.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #111;
  cursor: pointer;
  transition:
    transform  0.3s cubic-bezier(.34,1.56,.64,1),
    box-shadow 0.3s ease,
    background 0.2s;
  box-shadow: 0 2px 16px rgba(0,0,0,0.12);
}

.card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 14px 36px rgba(0,0,0,0.22);
  background: #fff;
}

.card:active { transform: scale(0.97); transition-duration: 0.1s; }

.card-icon {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  flex-shrink: 0;
  object-fit: cover;
}

.card-text { flex: 1; text-align: left; }
.card-title { font-size: 14px; font-weight: 700; line-height: 1.35; }
.card-desc  { font-size: 12px; color: #666; margin-top: 3px; }
.card-arrow { color: #ccc; font-size: 22px; font-weight: 300; flex-shrink: 0; }

/* ── MODAL ── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
  pointer-events: none;
  transition: background 0.3s ease, backdrop-filter 0.3s ease;
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
}

.modal.open {
  background: rgba(0,0,0,0.88);
  pointer-events: all;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.modal-content {
  transform: scale(0.86);
  opacity: 0;
  transition: transform 0.38s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease;
}

.modal.open .modal-content {
  transform: scale(1);
  opacity: 1;
}

.modal iframe {
  width: min(92vw, 600px);
  aspect-ratio: 16/9;
  border: none;
  border-radius: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.55);
  display: block;
}

.modal-img {
  width: min(80vw, 380px);
  border-radius: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.55);
  display: block;
}

/* ── SCROLL ANIMATIONS (re-trigger every time) ── */
[data-anim] {
  opacity: 0;
  will-change: opacity, transform;
  transition: none; /* no transition while outside viewport */
}

[data-anim="up"]    { transform: translateY(30px); }
[data-anim="scale"] { transform: scale(0.8);       }

[data-anim].visible {
  opacity: 1;
  transform: none;
  transition:
    opacity   0.58s cubic-bezier(.4,0,.2,1),
    transform 0.58s cubic-bezier(.4,0,.2,1);
  transition-delay: var(--d, 0s);
}

/* ── RESPONSIVE: TABLET / LAPTOP ── */
@media (min-width: 640px) {
  .avatar { width: 116px; height: 116px; }
  .name   { font-size: 26px; }
  .bio    { font-size: 15px; }
  .container { padding: 112px 28px 80px; }
  .card { padding: 14px 20px; border-radius: 22px; }
  .card-icon  { width: 52px; height: 52px; }
  .card-title { font-size: 15px; }
  .card-desc  { font-size: 13px; }
  .icon { width: 30px; height: 30px; }
  .social { gap: 36px; }
}

@media (min-width: 1024px) {
  .name { font-size: 28px; }
  .container { padding: 120px 32px 96px; }
}

/* ── RESPONSIVE: SMALL MOBILE ── */
@media (max-width: 380px) {
  .name { font-size: 19px; }
  .card-title { font-size: 13px; }
}
</style>
  </head>
  <body>

    <div class="topbar">
      <div>Beacons</div>
      <div>Try free</div>
    </div>

    <div class="container">

      <!-- AVATAR -->
      <div class="avatar" id="avatar" data-anim="scale">
        <img src="na.jpeg" alt="HLV Nguyễn Ngọc Anh">
        <div class="badge">✔</div>
      </div>

      <div class="name" data-anim="up" style="--d:.08s">HLV Nguyễn Ngọc
        Anh</div>
      <div class="bio" data-anim="up" style="--d:.15s">Cơ sở Kim Giang • Võ
        Đường CNK Hà Đông</div>

      <!-- SOCIAL ICONS -->
      <div class="social" data-anim="up" style="--d:.22s">
        <!-- TikTok -->
        <svg class="icon" data-link="https://www.tiktok.com/@connhikhuchadong"
          viewBox="0 0 24 24" fill="white">
          <path
            d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.5a8.16 8.16 0 0 0 4.77 1.52V7.55a4.85 4.85 0 0 1-1-.86z" />
        </svg>
        <!-- Facebook -->
        <svg class="icon"
          data-link="https://www.facebook.com/share/1G6diwqHoq/?mibextid=wwXIfr"
          viewBox="0 0 24 24" fill="white">
          <path
            d="M24 12.073C24 5.445 18.627 0 12 0S0 5.445 0 12.073c0 6.03 4.388 11.03 10.125 11.927v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.514c-1.491 0-1.956.925-1.956 1.875v2.25h3.328l-.532 3.49h-2.796v8.437C19.612 23.103 24 18.103 24 12.073z" />
        </svg>
        <!-- Phone -->
        <svg class="icon" data-phone="0326462544" viewBox="0 0 24 24"
          fill="white">
          <path
            d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
        </svg>
      </div>

      <!-- CARDS -->
      <div class="cards">

        <div class="card" data-action="gallery" data-anim="up" style="--d:.06s">
          <img class="card-icon"
            src="https://cdn-icons-png.flaticon.com/512/1829/1829586.png" alt>
          <div class="card-text">
            <div class="card-title">Video giới thiệu Võ đường CNK Hà Đông</div>
            <div class="card-desc">Xem thêm...</div>
          </div>
          <span class="card-arrow">›</span>
        </div>

        <div class="card" data-zalo="0326462544" data-anim="up"
          style="--d:.14s">
          <img class="card-icon"
            src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg"
            alt>
          <div class="card-text">
            <div class="card-title">LIÊN HỆ ZALO</div>
            <div class="card-desc">0326.462.544</div>
          </div>
          <span class="card-arrow">›</span>
        </div>

        <div class="card" data-link="https://www.dangcapnc.io.vn/#contact"
          data-anim="up" style="--d:.22s">
          <img class="card-icon"
            src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" alt>
          <div class="card-text">
            <div class="card-title">ĐĂNG KÝ LỚP HỌC</div>
            <div class="card-desc">Lựa chọn cơ sở học phù hợp</div>
          </div>
          <span class="card-arrow">›</span>
        </div>

        <div class="card"
          data-link="https://www.facebook.com/share/1G6diwqHoq/?mibextid=wwXIfr"
          data-anim="up" style="--d:.30s">
          <img class="card-icon"
            src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt>
          <div class="card-text">
            <div class="card-title">FACEBOOK</div>
            <div class="card-desc">Hoạt động võ đường</div>
          </div>
          <span class="card-arrow">›</span>
        </div>

      </div>
    </div>

    <!-- VIDEO MODAL -->
    <div class="modal" id="videoModal">
      <div class="modal-content">
        <iframe id="videoFrame" src allowfullscreen></iframe>
      </div>
    </div>

    <!-- AVATAR MODAL -->
    <div class="modal" id="imgModal">
      <div class="modal-content">
        <img class="modal-img" src="na.jpeg" alt="HLV Nguyễn Ngọc Anh">
      </div>
    </div>

    <script>
// ── OPEN / CLOSE MODAL ──
function openModal(id) {
  document.getElementById(id).classList.add("open");
}
function closeModal(modal) {
  modal.classList.remove("open");
  setTimeout(function() {
    modal.querySelectorAll("iframe").forEach(function(i) { i.src = ""; });
  }, 320);
}

// ── CLICK HANDLER ──
document.addEventListener("click", function(e) {
  // Interactable elements
  var el = e.target.closest("[data-link],[data-phone],[data-zalo],[data-action]");
  if (el) {
    setTimeout(function() {
      if (el.dataset.link)  window.open(el.dataset.link, "_blank");
      if (el.dataset.phone) location.href = "tel:" + el.dataset.phone;
      if (el.dataset.zalo)  window.open("https://zalo.me/" + el.dataset.zalo, "_blank");
      if (el.dataset.action === "gallery") {
        document.getElementById("videoFrame").src =
          "https://www.youtube.com/embed/LsEXa9dJoZE?autoplay=1";
        openModal("videoModal");
      }
    }, 80);
    return;
  }

  // Close modal when clicking backdrop (outside modal-content)
  var modal = e.target.closest(".modal");
  if (modal && !e.target.closest(".modal-content")) {
    closeModal(modal);
  }
});

// Avatar click → show photo
document.getElementById("avatar").addEventListener("click", function() {
  openModal("imgModal");
});

// ── SCROLL ANIMATIONS: re-trigger every time element enters viewport ──
var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    } else {
      entry.target.classList.remove("visible");
    }
  });
}, { threshold: 0.12, rootMargin: "0px 0px -16px 0px" });

document.querySelectorAll("[data-anim]").forEach(function(el) {
  observer.observe(el);
});
</script>

  </body>
</html>
