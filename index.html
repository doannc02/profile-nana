<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLV Nguyễn Ngọc Anh – CNK Hà Đông</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ──────────────────────────────────────────
   RESET & BASE
────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  margin: 0; padding: 0;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  color: #fff;
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 50% -10%, #ff2d95 0%, transparent 55%),
    linear-gradient(180deg, #c2185b 0%, #5a0a30 35%, #0d0d0d 75%, #000 100%);
  display: flex;
  justify-content: center;
  overflow-x: hidden;
}

/* ──────────────────────────────────────────
   TOPBAR
────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 680px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 14px;
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #000;
  font-weight: 700;
  font-size: 14px;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* ──────────────────────────────────────────
   CONTAINER
────────────────────────────────────────── */
.container {
  width: 100%;
  max-width: 480px;
  padding: 100px 20px 60px;
  text-align: center;
}

/* ──────────────────────────────────────────
   AVATAR
────────────────────────────────────────── */
.avatar-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  margin: 0 auto;
  cursor: pointer;
}

.avatar-wrap img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 3px solid #fff;
  object-fit: cover;
  object-position: center 20%;
  transform: scale(1.3);
  position: relative;
  z-index: 1;
}

.avatar-wrap::before {
  content: "";
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(#ff2d95, #ff7ad9, #ff2d95);
  z-index: 0;
  animation: spin-glow 4s linear infinite;
  filter: blur(6px);
}

@keyframes spin-glow {
  to { transform: rotate(360deg); }
}

.badge {
  position: absolute;
  bottom: 2px;
  right: 2px;
  background: #1da1f2;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  z-index: 2;
  border: 2px solid #fff;
}

/* ──────────────────────────────────────────
   TEXT
────────────────────────────────────────── */
.profile-name {
  font-size: 22px;
  font-weight: 800;
  margin-top: 28px;
  letter-spacing: -0.3px;
}

.profile-bio {
  font-size: 14px;
  opacity: 0.8;
  margin-top: 6px;
}

/* ──────────────────────────────────────────
   SOCIAL ICONS
────────────────────────────────────────── */
.social {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 24px 0;
}

.social-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  border: 1px solid rgba(255,255,255,0.2);
}

.social-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: translateY(-3px);
}

.social-btn svg {
  width: 22px;
  height: 22px;
}

/* ──────────────────────────────────────────
   CARDS
────────────────────────────────────────── */
.cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.96);
  border-radius: 16px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  color: #111;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  border: 1px solid rgba(255,255,255,0.6);
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.18);
}

.card:active { transform: scale(0.97); }

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
}

.card-text { text-align: left; flex: 1; }
.card-title { font-size: 13px; font-weight: 700; }
.card-desc  { font-size: 11px; color: #777; margin-top: 2px; }

.card-arrow {
  opacity: 0.35;
  font-size: 18px;
  line-height: 1;
}

/* ──────────────────────────────────────────
   SCROLL ANIMATIONS
────────────────────────────────────────── */
.anim {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}

.anim.visible {
  opacity: 1;
  transform: translateY(0);
}

/* stagger delays for cards */
.anim[data-delay="1"] { transition-delay: 0.05s; }
.anim[data-delay="2"] { transition-delay: 0.12s; }
.anim[data-delay="3"] { transition-delay: 0.19s; }
.anim[data-delay="4"] { transition-delay: 0.26s; }

/* ──────────────────────────────────────────
   MODAL
────────────────────────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal iframe {
  width: 100%;
  max-width: 640px;
  aspect-ratio: 16/9;
  border: none;
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal img {
  width: 100%;
  max-width: 360px;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* ──────────────────────────────────────────
   RESPONSIVE – DESKTOP
────────────────────────────────────────── */
@media (min-width: 768px) {
  .container {
    max-width: 680px;
    padding: 110px 40px 80px;
  }

  .avatar-wrap {
    width: 130px;
    height: 130px;
  }

  .profile-name { font-size: 28px; margin-top: 32px; }
  .profile-bio  { font-size: 16px; }

  .social { gap: 40px; margin: 28px 0; }
  .social-btn { width: 56px; height: 56px; }
  .social-btn svg { width: 26px; height: 26px; }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .card { border-radius: 18px; padding: 14px 18px; }
  .card-icon { width: 52px; height: 52px; }
  .card-title { font-size: 14px; }
  .card-desc  { font-size: 12px; }
}

@media (min-width: 1024px) {
  .container { padding: 120px 60px 100px; }
  .profile-name { font-size: 32px; }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

</div>

<div class="container">

  <!-- AVATAR -->

  <!-- SOCIAL -->
  <div class="social anim" data-delay="3">

    <div class="social-btn" data-link="https://www.tiktok.com/@connhikhuchadong">
      <svg viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.5a8.16 8.16 0 0 0 4.77 1.52V7.55a4.85 4.85 0 0 1-1-.86z"/></svg>
    </div>

    <!-- Facebook -->
    <div class="social-btn" data-link="https://www.facebook.com/share/1G6diwqHoq/?mibextid=wwXIfr">
      <svg viewBox="0 0 24 24" fill="white"><path d="M24 12.073C24 5.445 18.627 0 12 0S0 5.445 0 12.073c0 6.03 4.388 11.03 10.125 11.927v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.514c-1.491 0-1.956.925-1.956 1.875v2.25h3.328l-.532 3.49h-2.796v8.437C19.612 23.103 24 18.103 24 12.073z"/></svg>

<!-- VIDEO MODAL -->
<div class="modal" id="videoModal">
  <iframe id="videoFrame" src="" allowfullscreen></iframe>
</div>

<!-- AVATAR MODAL -->
<div class="modal" id="imgModal">
  <img src="na.jpeg" alt="HLV Nguyễn Ngọc Anh">
</div>

<script>
/* ── CLICK HANDLER ── */
document.addEventListener("click", function(e) {
  /* modal close */
  if (e.target.classList.contains("modal")) {
    e.target.style.display = "none";
    e.target.querySelectorAll("iframe").forEach(function(i) { i.src = ""; });
    return;
  }

  const el = e.target.closest("[data-link],[data-phone],[data-zalo],[data-action]");
  if (!el) return;

  if (el.dataset.link)   { window.open(el.dataset.link, "_blank"); return; }
  if (el.dataset.phone)  { location.href = "tel:" + el.dataset.phone; return; }
  if (el.dataset.zalo)   { window.open("https://zalo.me/" + el.dataset.zalo, "_blank"); return; }

  if (el.dataset.action === "gallery") {
    document.getElementById("videoFrame").src =
      "https://www.youtube.com/embed/LsEXa9dJoZE?autoplay=1&rel=0";
    document.getElementById("videoModal").style.display = "flex";
  }
});

/* avatar modal */
document.getElementById("avatar").addEventListener("click", function() {
  document.getElementById("imgModal").style.display = "flex";
});

/* ── SCROLL ANIMATIONS (repeat every scroll) ── */
var animItems = document.querySelectorAll(".anim");

var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    } else {
      /* remove so animation replays next time */
      entry.target.classList.remove("visible");
    }
  });
}, { threshold: 0.15 });

animItems.forEach(function(el) { observer.observe(el); });
</script>

</body>
