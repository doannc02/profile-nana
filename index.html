<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLV Nguyễn Ngọc Anh</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;

  background:
    radial-gradient(circle at 50% -20%, #ff2d95 0%, transparent 40%),
    linear-gradient(180deg, #d81b60 0%, #6a0f3a 40%, #0d0d0d 80%, #000 100%);

  display: flex;
  justify-content: center;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 420px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  color: #000;
  font-weight: 600;
}

/* CONTAINER */
.container {
  max-width: 420px;
  padding: 90px 16px 40px;
  text-align: center;
}

/* AVATAR */
.avatar {
  position: relative;
  width: 90px;
  height: 90px;
  margin: auto;
  cursor: pointer;
}

.avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 3px solid white;
  object-fit: cover;
  object-position: center 20%;
  transform: scale(1.3);
}

.avatar::before {
  content: "";
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: linear-gradient(45deg, #ff2d95, #ff7ad9);
  filter: blur(10px);
  z-index: -1;
}

.badge {
  position: absolute;
  bottom: 0;
  right: 0;
  background: #1da1f2;
  border-radius: 50%;
  padding: 4px;
}

/* TEXT */
.name { font-size: 20px; font-weight: 700; margin-top: 24px; }
.bio { font-size: 14px; opacity: 0.85; }

/* SOCIAL */
.social {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin: 20px 0;
}

.icon {
  width: 26px;
  height: 26px;
  cursor: pointer;
}

/* CARD */
.card {
  background: #f3f3f3;
  border-radius: 999px;
  padding: 10px 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: #000;
  cursor: pointer;
  transition: 0.2s;
}

.card:active { transform: scale(0.96); }

.card img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
}

.text { text-align: left; }
.title { font-size: 13px; font-weight: 600; }
.desc { font-size: 11px; color: #666; }

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal video {
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  outline: none;
}

.modal img {
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Beacons</div>
  <div>Try free</div>
</div>

<div class="container">

  <!-- AVATAR -->
  <div class="avatar" id="avatar">
    <img src="na.jpeg">
    <div class="badge">✔</div>
  </div>

  <div class="name">HLV Nguyễn Ngọc Anh</div>
  <div class="bio">Cơ sở Kim Giang • Võ Đường CNK Hà Đông</div>

  <!-- SOCIAL -->
  <div class="social">
    <!-- TikTok -->
    <svg class="icon" data-link="https://www.tiktok.com/@connhikhuchadong" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.5a8.16 8.16 0 0 0 4.77 1.52V7.55a4.85 4.85 0 0 1-1-.86z"/>
    </svg>

    <!-- Facebook -->
    <svg class="icon" data-link="https://www.facebook.com/share/1G6diwqHoq/?mibextid=wwXIfr" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 12.073C24 5.445 18.627 0 12 0S0 5.445 0 12.073c0 6.03 4.388 11.03 10.125 11.927v-8.437H7.078v-3.49h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953h-1.514c-1.491 0-1.956.925-1.956 1.875v2.25h3.328l-.532 3.49h-2.796v8.437C19.612 23.103 24 18.103 24 12.073z"/>
    </svg>

    <!-- Phone -->
    <svg class="icon" data-phone="0326462544" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
    </svg>
  </div>

  <!-- CARDS -->
  <div class="card" data-action="gallery">
    <img src="https://cdn-icons-png.flaticon.com/512/1829/1829586.png">
    <div class="text">
      <div class="title">VIDEO BIỂU DIỄN CNK</div>
      <div class="desc">Xem kỹ thuật</div>
    </div>
  </div>

  <div class="card" data-zalo="0326462544">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
    <div class="text">
      <div class="title">LIÊN HỆ ZALO</div>
      <div class="desc">0326.462.544</div>
    </div>
  </div>

  <div class="card" data-link="https://dangcapnc.io.vn">
    <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
    <div class="text">
      <div class="title">ĐĂNG KÝ LỚP HỌC</div>
      <div class="desc">Tham gia CNK</div>
    </div>
  </div>

  <div class="card" data-link="https://www.facebook.com/share/1G6diwqHoq/?mibextid=wwXIfr">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    <div class="text">
      <div class="title">FACEBOOK</div>
      <div class="desc">Hoạt động võ đường</div>
    </div>
  </div>

</div>

<!-- VIDEO MODAL -->
<div class="modal" id="videoModal">
  <video id="videoPlayer" controls playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<!-- AVATAR MODAL -->
<div class="modal" id="imgModal">
  <img src="na.jpeg">
</div>

<script>
document.addEventListener("click", function(e) {
  const el = e.target.closest("[data-link],[data-phone],[data-zalo],[data-action]");
  if (!el) return;

  setTimeout(() => {
    if (el.dataset.link) window.open(el.dataset.link);
    if (el.dataset.phone) location.href = "tel:" + el.dataset.phone;
    if (el.dataset.zalo) window.open("https://zalo.me/" + el.dataset.zalo);

    if (el.dataset.action === "gallery") {
      const player = document.getElementById("videoPlayer");
      player.currentTime = 0;
      player.play();
      document.getElementById("videoModal").style.display = "flex";
    }
  }, 100);
});

document.querySelectorAll(".modal").forEach(function(m) {
  m.addEventListener("click", function() {
    m.style.display = "none";
    var vid = m.querySelector("video");
    if (vid) { vid.pause(); vid.currentTime = 0; }
  });
});

document.getElementById("avatar").addEventListener("click", function() {
  document.getElementById("imgModal").style.display = "flex";
});
</script>

</body>
</html>
